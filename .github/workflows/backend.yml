name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'assignment_3_CICD_Pipeline/Dream-Vacation-App/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'assignment_3_CICD_Pipeline/Dream-Vacation-App/backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'assignment_3_CICD_Pipeline/Dream-Vacation-App/backend/package-lock.json'

      - name: Install dependencies
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/backend
        run: npm ci

      - name: Run linter
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/backend
        run: npm test --if-present -- --passWithNoTests
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t dream-vacation-backend:test assignment_3_CICD_Pipeline/Dream-Vacation-App/backend

  push:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Push to Docker Hub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: assignment_3_CICD_Pipeline/Dream-Vacation-App/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kh-2026-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kh-2026-backend:${{ github.sha }}
