name: Frontend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test Frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend
        run: npm ci

      - name: Run linter
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend
        run: CI=true npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Build React app
        working-directory: assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend
        env:
          REACT_APP_API_URL: http://localhost:3001
        run: npm run build

      - name: Build Docker image
        run: docker build --build-arg REACT_APP_API_URL=http://localhost:3001 -t dream-vacation-frontend:test assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend

  push:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Push to Docker Hub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: assignment_3_CICD_Pipeline/Dream-Vacation-App/frontend
          build-args: |
            REACT_APP_API_URL=http://localhost:3001
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dream-vacation-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/dream-vacation-frontend:${{ github.sha }}
